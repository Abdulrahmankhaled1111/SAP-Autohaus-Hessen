name: SAP BTP CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: sap-btp-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Check and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run project checks
        run: npm run check

      - name: Build BTP package
        run: npm run build:btp

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: autohaus-hessen-btp-build
          path: |
            dist
            manifest.yml
            server
            approuter
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to SAP BTP
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    environment: sap-btp-production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run project checks
        run: npm run check

      - name: Build BTP package
        run: npm run build:btp

      - name: Install Cloud Foundry CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8" -o cf-cli.tgz
          mkdir cf-cli
          tar -xzf cf-cli.tgz -C cf-cli
          if [ -f cf-cli/cf8 ]; then
            sudo mv cf-cli/cf8 /usr/local/bin/cf
          elif [ -f cf-cli/cf ]; then
            sudo mv cf-cli/cf /usr/local/bin/cf
          else
            echo "Cloud Foundry CLI binary not found" >&2
            exit 1
          fi
          cf version

      - name: Authenticate Cloud Foundry
        shell: bash
        env:
          CF_API: ${{ secrets.CF_API }}
          CF_ORG: ${{ secrets.CF_ORG }}
          CF_SPACE: ${{ secrets.CF_SPACE }}
          CF_CLIENT_ID: ${{ secrets.CF_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_CLIENT_SECRET }}
          CF_USERNAME: ${{ secrets.CF_USERNAME }}
          CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
          CF_ORIGIN: ${{ secrets.CF_ORIGIN }}
        run: |
          set -euo pipefail
          : "${CF_API:?GitHub Secret CF_API fehlt}"
          : "${CF_ORG:?GitHub Secret CF_ORG fehlt}"
          : "${CF_SPACE:?GitHub Secret CF_SPACE fehlt}"

          cf api "$CF_API"

          if [ -n "${CF_CLIENT_ID:-}" ] && [ -n "${CF_CLIENT_SECRET:-}" ]; then
            cf auth "$CF_CLIENT_ID" "$CF_CLIENT_SECRET" --client-credentials
          else
            : "${CF_USERNAME:?GitHub Secret CF_USERNAME fehlt, falls kein technischer Client verwendet wird}"
            : "${CF_PASSWORD:?GitHub Secret CF_PASSWORD fehlt, falls kein technischer Client verwendet wird}"
            if [ -n "${CF_ORIGIN:-}" ]; then
              cf auth "$CF_USERNAME" "$CF_PASSWORD" --origin "$CF_ORIGIN"
            else
              cf auth "$CF_USERNAME" "$CF_PASSWORD"
            fi
          fi

          cf target -o "$CF_ORG" -s "$CF_SPACE"

      - name: Push applications to SAP BTP
        run: cf push -f manifest.yml

      - name: Show Cloud Foundry app status
        run: cf apps
