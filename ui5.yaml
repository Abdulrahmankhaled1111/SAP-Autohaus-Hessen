specVersion: "3.0"
metadata:
  name: autohaus-hessen-sap
type: application
resources:
  configuration:
    paths:
      webapp: "."
framework:
  name: SAPUI5
  version: "1.108.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.f
    - name: sap.suite.ui.microchart
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: true
        backend:
          - path: /sap
            url: https://localhost:44300
            client: "100"
