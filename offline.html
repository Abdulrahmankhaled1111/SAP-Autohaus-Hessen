<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f6ab4">
  <title>Autohaus HESSEN - Offline</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f9fb;
      color: #1d2d3e;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(520px, 100%);
      background: #fff;
      border: 1px solid #d8e2ea;
      border-radius: 8px;
      box-shadow: 0 18px 42px rgba(27, 39, 51, 0.14);
      padding: 28px;
    }

    .mark {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      margin-bottom: 20px;
      background: #0f6ab4;
      color: #fff;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.45rem;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      line-height: 1.55;
      color: #536579;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      border-radius: 6px;
      background: #0f6ab4;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">AH</div>
    <h1>Keine Verbindung</h1>
    <p>Die Autohaus-App ist installiert, aber fuer aktuelle Firmendaten brauchst du eine Internetverbindung und deinen SAP-Login.</p>
    <a href="/index.html">Erneut versuchen</a>
  </main>
</body>
</html>
